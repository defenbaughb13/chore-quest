<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chore Quest ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- ============================================================
  HOW TO CUSTOMIZE WITHOUT LOSING COIN HISTORY
  ============================================================
  1. Open this file in any text editor (Notepad, TextEdit, etc.)
  2. Find the CONFIG block below and edit chores, shop items,
     or surprise challenges however you like.
  3. Save the file and reload it in the browser.
  4. His coin balance, streak, and history are saved in the
     browser's localStorage — they will NOT be reset by editing
     the config. Only tapping "Reset Everything" in the app
     (parent section) will clear that data.
  ============================================================ -->

<script>
// ============================================================
// CONFIG — EDIT THIS SECTION FREELY
// ============================================================
const CONFIG = {

  // Your son's name (shows in the header)
  kidName: "Chore Quest",

  // Chores — add, remove, or change any of these.
  // emoji: any emoji character
  // name:  chore label shown on screen
  // coins: how many coins completing it earns
  // days:  which days it appears. Options: "daily", "weekdays", "weekends", or
  //        an array like ["Mon","Wed","Fri"]. Use "daily" to show every day.
  chores: [
    { id: "c1", emoji: "🛏️", name: "Make my bed",                    coins: 5,  days: "daily"    },
    { id: "c2", emoji: "🦷", name: "Brush teeth (morning & night)",   coins: 5,  days: "daily"    },
    { id: "c3", emoji: "🧺", name: "Put dirty clothes in hamper",     coins: 5,  days: "daily"    },
    { id: "c4", emoji: "🍽️", name: "Help set the dinner table",       coins: 8,  days: "daily"    },
    { id: "c5", emoji: "🧹", name: "Tidy up my toys",                 coins: 10, days: "daily"    },
    { id: "c6", emoji: "📚", name: "Read for 15 minutes",             coins: 10, days: "weekdays" },
    { id: "c7", emoji: "🐾", name: "Feed the pet",                    coins: 8,  days: "daily"    },
    { id: "c8", emoji: "🛒", name: "Help put groceries away",         coins: 12, days: "weekends" },
  ],

  // Surprise bonus challenges — shown one at a time, randomly picked each day.
  // Add as many as you like!
  surprises: [
    { text: "Do 10 jumping jacks!",                        coins: 5  },
    { text: "Draw a picture and show mom or dad!",         coins: 5  },
    { text: "Do something kind for someone today!",        coins: 8  },
    { text: "Water a plant!",                              coins: 5  },
    { text: "Get into bed on time tonight!",               coins: 6  },
    { text: "Wipe down a counter in the kitchen!",         coins: 6  },
    { text: "Pick up 10 things off the floor!",            coins: 5  },
    { text: "Help carry laundry to the washer!",           coins: 7  },
    { text: "Say something nice to everyone in the house!",coins: 8  },
    { text: "Set out your clothes for tomorrow!",          coins: 6  },
  ],

  // Coin shop rewards.
  // cost: how many coins to redeem
  // NOTE: buying an item just shows a "tell a parent!" message.
  //       Nothing is automatic — you approve it in real life.
  shop: [
    { id: "s1", emoji: "🎮", name: "15 min extra screen time", cost: 20 },
    { id: "s2", emoji: "🍦", name: "Choose tonight's dessert", cost: 25 },
    { id: "s3", emoji: "🎬", name: "Pick movie night",          cost: 35 },
    { id: "s4", emoji: "🌃", name: "Stay up 30 min late",       cost: 40 },
    { id: "s5", emoji: "🧁", name: "Bake something together",   cost: 50 },
    { id: "s6", emoji: "🎳", name: "Family bowling trip",       cost: 80 },
  ],

  // Parent PIN for the settings/reset panel (4-digit string)
  parentPin: "1234",

};
// ============================================================
// END CONFIG
// ============================================================
</script>

<style>

<body>

<div class="header">
  <button class="settings-btn" onclick="openParent()" aria-label="Parent settings">⚙️</button>
  <div class="header-name" id="header-name">⭐ Chore Quest ⭐</div>
  <div class="header-sub" id="header-sub">Let's earn some coins!</div>

</div>

<div class="streak-row" id="streak-row"></div>

<!-- TABS -->
<div id="tab-chores"   class="section active"></div>
<div id="tab-shop"     class="section"></div>
<div id="tab-history"  class="section"></div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('chores',this)">
    <span class="tab-icon">📋</span>Chores
  </button>
  <button class="tab-btn" onclick="switchTab('shop',this)">
    <span class="tab-icon">🛒</span>Shop
  </button>
  <button class="tab-btn" onclick="switchTab('history',this)">
    <span class="tab-icon">📜</span>History
  </button>
</nav>

<!-- PARENT MODAL -->
<div class="modal-overlay" id="parent-overlay">
  <div class="modal">
    <div class="modal-title">🔒 Parent Panel</div>

    <div id="pin-area">
      <div class="pin-row">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4"
               id="pin-field" placeholder="••••" autocomplete="off">
      </div>
      <button class="btn-purple" onclick="checkPin()">Unlock</button>
      <div class="pin-error" id="pin-error"></div>
    </div>

    <div class="parent-section" id="parent-unlocked">
      <div class="parent-stat">Total coins earned all-time <span id="ps-earned">0</span></div>
      <div class="parent-stat">Current coin balance <span id="ps-balance">0</span></div>
      <div class="parent-stat">Day streak <span id="ps-streak">0</span></div>
      <div class="parent-stat">Chores done today <span id="ps-today">0</span></div>

      <p style="font-size:13px;font-weight:700;color:var(--text-muted);margin:12px 0 6px;">Add or remove coins manually:</p>
      <div class="add-coins-row">
        <input type="number" id="adjust-amount" placeholder="e.g. 10" min="-999" max="999">
        <button class="btn-sm-purple" onclick="adjustCoins()">Apply</button>
      </div>

      <button class="btn-danger" onclick="resetAll()">⚠️ Reset Everything</button>
      <button class="btn-close"  onclick="closeParent()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
const STORAGE_KEY = 'chorequest_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    coins: 0,
    coinsEarned: 0,
    streak: 0,
    lastActiveDate: null,
    // done[date] = Set of chore ids done that day
    done: {},
    // surprise[date] = { used: bool, claimed: bool, idx: number }
    surprise: {},
    // history = [{date, label, delta}]
    history: []
  };
}

function saveState() {
  // Convert sets to arrays for JSON
  const out = {
    ...state,
    done: Object.fromEntries(
      Object.entries(state.done).map(([d, s]) => [d, [...s]])
    )
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
}

function hydrateState(raw) {
  // Convert done arrays back to Sets
  const done = {};
  if (raw.done) {
    for (const [d, arr] of Object.entries(raw.done)) {
      done[d] = new Set(arr);
    }
  }
  return { ...raw, done };
}

let state = hydrateState(loadState());

// ===================== DATE HELPERS =====================
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayName() {
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
}

function isWeekend() {
  const d = new Date().getDay();
  return d === 0 || d === 6;
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const [y, m, da] = isoStr.split('-');
  return `${m}/${da}/${y}`;
}

// ===================== STREAK =====================
function checkStreak() {
  const t = today();
  if (state.lastActiveDate === t) return;
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  if (state.lastActiveDate === yesterday) {
    state.streak = (state.streak || 0) + 1;
  } else if (state.lastActiveDate !== t) {
    state.streak = 1;
  }
  state.lastActiveDate = t;
  saveState();
}

function renderStreak() {
  const row = document.getElementById('streak-row');
  const s = Math.min(state.streak || 0, 7);
  let html = '';
  for (let i = 0; i < 7; i++) {
    html += `<div class="streak-dot ${i < s ? 'lit' : ''}">
      ${i < s ? '⭐' : (i+1)}
    </div>`;
  }
  html += `<span class="streak-lbl">${state.streak || 0}-day streak!</span>`;
  row.innerHTML = html;
}

// ===================== CHORES =====================
function choreVisible(chore) {
  const d = chore.days;
  if (!d || d === 'daily') return true;
  if (d === 'weekends') return isWeekend();
  if (d === 'weekdays') return !isWeekend();
  if (Array.isArray(d)) return d.includes(dayName());
  return true;
}

function todayDone() {
  return state.done[today()] || new Set();
}

function renderChores() {
  const container = document.getElementById('tab-chores');
  const visible = CONFIG.chores.filter(choreVisible);
  const done = todayDone();
  const doneCount = [...done].filter(id => CONFIG.chores.find(c => c.id === id)).length;
  const total = visible.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;

  let html = `<div class="sec-label">📋 Today's chores</div>
    <div class="progress-wrap">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="progress-lbl">${doneCount} of ${total} done</div>
    <div class="chore-list" style="margin-top:0.8rem;">`;

  if (!visible.length) {
    html += `<div class="empty-msg">No chores today — enjoy your day! 🎉</div>`;
  } else {
    for (const c of visible) {
      const isDone = done.has(c.id);
      html += `
        <div class="chore-card ${isDone ? 'done' : ''}" onclick="toggleChore('${c.id}')">
          <div class="chore-emoji">${c.emoji}</div>
          <div class="chore-info">
            <div class="chore-name">${c.name}</div>
            <div class="chore-coins">🪙 +${c.coins} coins</div>
          </div>
          <div class="chore-check">${isDone ? '✅' : '⭕'}</div>
        </div>`;
    }
  }

  html += `</div>`;

  // Surprise section
  const surpriseData = state.surprise[today()] || {};
  const idx = surpriseData.idx !== undefined
    ? surpriseData.idx
    : Math.floor(Math.random() * CONFIG.surprises.length);

  if (!state.surprise[today()]) {
    state.surprise[today()] = { idx, used: false, claimed: false };
    saveState();
  }

  const surprise = CONFIG.surprises[idx];
  const claimed = state.surprise[today()].claimed;

  html += `
    <div class="surprise-box">
      <div class="surprise-title">🎲 Bonus Challenge!</div>
      <div class="surprise-text">${claimed ? "You did it! Come back tomorrow for a new challenge! 🌟" : surprise.text}</div>
      ${!claimed ? `<div class="surprise-coins">🪙 Worth +${surprise.coins} coins!</div>` : ''}
      <button class="btn-gold" ${claimed ? 'disabled' : ''} onclick="claimSurprise()">
        ${claimed ? '✅ Claimed!' : '🎉 I did it! Collect coins'}
      </button>
    </div>`;

  container.innerHTML = html;
}

function toggleChore(id) {
  const t = today();
  if (!state.done[t]) state.done[t] = new Set();
  const chore = CONFIG.chores.find(c => c.id === id);
  if (!chore) return;

  if (state.done[t].has(id)) {
    state.done[t].delete(id);
    state.coins = Math.max(0, state.coins - chore.coins);
    addHistory(`Unchecked: ${chore.name}`, -chore.coins);
    showToast('Chore unchecked', 'bad');
  } else {
    state.done[t].add(id);
    state.coins += chore.coins;
    state.coinsEarned = (state.coinsEarned || 0) + chore.coins;
    addHistory(`✅ ${chore.name}`, chore.coins);
    showToast(`+${chore.coins} coins! Great job! 🎉`);
    confetti();
  }

  checkStreak();
  saveState();
  renderAll();
}

function claimSurprise() {
  const t = today();
  const s = state.surprise[t];
  if (!s || s.claimed) return;
  const surprise = CONFIG.surprises[s.idx];
  state.coins += surprise.coins;
  state.coinsEarned = (state.coinsEarned || 0) + surprise.coins;
  s.claimed = true;
  addHistory(`🎲 Bonus challenge`, surprise.coins);
  showToast(`Bonus! +${surprise.coins} coins! 🌟`);
  confetti();
  saveState();
  renderAll();
}

// ===================== SHOP =====================
function renderShop() {
  const container = document.getElementById('tab-shop');
  let html = `<div class="sec-label">🛒 Coin shop</div>
    <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px;">
      Buy something, then find a parent to make it happen!
    </p>
    <div class="shop-grid">`;

  for (const item of CONFIG.shop) {
    const can = state.coins >= item.cost;
    html += `
      <div class="shop-card ${can ? 'affordable' : 'cant-afford'}" onclick="buyItem('${item.id}')">
        <div class="shop-emoji">${item.emoji}</div>
        <div class="shop-name">${item.name}</div>
        <div class="shop-cost">🪙 ${item.cost}</div>
      </div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

function buyItem(id) {
  const item = CONFIG.shop.find(i => i.id === id);
  if (!item) return;
  if (state.coins < item.cost) {
    showToast('Not enough coins yet! 😅', 'bad');
    return;
  }
  if (!confirm(`Spend ${item.cost} coins on "${item.name}"?\n\nFind a parent to confirm!`)) return;
  state.coins -= item.cost;
  addHistory(`🛒 ${item.name}`, -item.cost);
  showToast(`${item.emoji} Nice! Go find a parent!`, 'info');
  saveState();
  renderAll();
}

// ===================== HISTORY =====================
function addHistory(label, delta) {
  state.history = state.history || [];
  state.history.unshift({ date: today(), label, delta });
  if (state.history.length > 100) state.history = state.history.slice(0, 100);
}

function renderHistory() {
  const container = document.getElementById('tab-history');
  const h = state.history || [];
  let html = `<div class="sec-label">📜 Coin history</div>`;

  if (!h.length) {
    html += `<div class="empty-msg" style="padding-top:2rem;">No history yet — start doing chores! 💪</div>`;
  } else {
    html += `<div class="history-list">`;
    for (const item of h) {
      const plus = item.delta >= 0;
      html += `
        <div class="history-item">
          <div class="hi-left">
            ${item.label}
            <div class="hi-date">${formatDate(item.date)}</div>
          </div>
          <div class="hi-right ${!plus ? 'hi-neg' : ''}">
            ${plus ? '+' : ''}${item.delta} 🪙
          </div>
        </div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

// ===================== TABS =====================
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===================== PARENT PANEL =====================
function openParent() {
  document.getElementById('parent-overlay').classList.add('open');
  document.getElementById('pin-field').value = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('parent-unlocked').classList.remove('unlocked');
  document.getElementById('pin-area').style.display = '';
  setTimeout(() => document.getElementById('pin-field').focus(), 100);
}

function closeParent() {
  document.getElementById('parent-overlay').classList.remove('open');
}

function checkPin() {
  const val = document.getElementById('pin-field').value.trim();
  if (val === String(CONFIG.parentPin)) {
    document.getElementById('pin-area').style.display = 'none';
    document.getElementById('parent-unlocked').classList.add('unlocked');
    document.getElementById('ps-earned').textContent = state.coinsEarned || 0;
    document.getElementById('ps-balance').textContent = state.coins;
    document.getElementById('ps-streak').textContent = state.streak || 0;
    const todayDoneCount = [...todayDone()].filter(id => CONFIG.chores.find(c => c.id === id)).length;
    document.getElementById('ps-today').textContent = todayDoneCount;
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN, try again.';
    document.getElementById('pin-field').value = '';
  }
}

function adjustCoins() {
  const amt = parseInt(document.getElementById('adjust-amount').value, 10);
  if (isNaN(amt)) { showToast('Enter a number first', 'bad'); return; }
  state.coins = Math.max(0, state.coins + amt);
  if (amt > 0) state.coinsEarned = (state.coinsEarned || 0) + amt;
  addHistory(`Parent adjustment`, amt);
  saveState();
  renderAll();
  document.getElementById('ps-balance').textContent = state.coins;
  document.getElementById('adjust-amount').value = '';
  showToast(`Coins adjusted by ${amt > 0 ? '+' : ''}${amt}`, 'info');
}

function resetAll() {
  if (!confirm('This will delete ALL coins, history, and streaks. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = hydrateState(loadState());
  closeParent();
  showToast('Everything reset!', 'bad');
  renderAll();
}

// Close overlay on backdrop click
document.getElementById('parent-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeParent();
});

// PIN on Enter key
document.getElementById('pin-field').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPin();
});

// ===================== UI HELPERS =====================
function updateCoinDisplay() {
  document.getElementById('coin-count').textContent = state.coins;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 2400);
}

function confetti() {
  const colors = ['#a855f7','#f59e0b','#22c55e','#ec4899','#3b82f6'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.2 + Math.random() * 1.4}s;
      animation-delay: ${Math.random() * 0.4}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }
}

// ===================== INIT =====================
function renderAll() {
  updateCoinDisplay();
  renderStreak();
  renderChores();
  renderShop();
  renderHistory();
}

document.getElementById('header-name').textContent = `⭐ ${CONFIG.kidName} ⭐`;

checkStreak();
renderAll();
</script>
</body>
</html>

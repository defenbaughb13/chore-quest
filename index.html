<html lang="en">
<head>

<title>Chore Quest ⭐</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7c3aed;--accent-mid:#8b5cf6;--accent-light:#ede9fe;
  --gold:#f59e0b;--gold-light:#fef3c7;
  --green:#22c55e;--green-light:#f0fdf4;
  --red:#ef4444;--orange:#f97316;
  --surface:#ffffff;--surface2:#f8f7ff;
  --border:#e9d5ff;--text:#1e1b4b;--text-muted:#7c7a9a;
  --radius:18px;--radius-sm:12px;
}
html,body{height:100%;background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

/* PICKER */
#profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem 1.5rem;gap:1.5rem}
.picker-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--text);text-align:center}
.picker-sub{font-size:15px;font-weight:600;color:var(--text-muted);text-align:center;margin-top:-1rem}
.picker-cards{display:flex;flex-direction:column;gap:16px;width:100%}
.picker-card{background:var(--surface);border:3px solid var(--border);border-radius:24px;padding:1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:transform .12s;user-select:none}
.picker-card:active{transform:scale(.97)}
.picker-avatar-wrap{width:72px;height:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.picker-emoji{font-size:52px;text-align:center}
.picker-info{flex:1}
.picker-name{font-family:'Fredoka One',cursive;font-size:26px;line-height:1}
.picker-coins{font-size:14px;font-weight:700;color:var(--text-muted);margin-top:3px}
.picker-arrow{font-size:28px;color:var(--text-muted)}

/* APP */
#app{display:none;flex-direction:column;min-height:100dvh;padding-bottom:90px}
#app.visible{display:flex}

/* HEADER */
.header{padding:1.2rem 1.2rem 1.8rem;border-radius:0 0 28px 28px;color:white;position:relative;text-align:center;background:linear-gradient(140deg,var(--accent) 0%,var(--accent-mid) 100%);box-shadow:0 4px 24px rgba(0,0,0,.15);transition:background .4s}
.header-back,.settings-btn{position:absolute;top:14px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white}
.header-back{left:14px}
.settings-btn{right:14px}
.badge-wrap{position:relative;display:inline-flex}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--orange);color:white;font-size:10px;font-weight:800;font-family:'Fredoka One',cursive;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid white}
.header-avatar-wrap{width:64px;height:64px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center}
.header-emoji{font-size:44px;line-height:1}
.header-name{font-family:'Fredoka One',cursive;font-size:24px;letter-spacing:.5px}
.coin-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.35);border-radius:50px;padding:7px 18px;font-size:19px;font-weight:800;margin-top:8px;font-family:'Fredoka One',cursive}

/* STREAK */
.streak-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:1rem 1.2rem 0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;flex-wrap:wrap}
.streak-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-muted);transition:background .3s,border-color .3s}
.streak-dot.lit{background:var(--accent);border-color:var(--accent);color:white}
.streak-lbl{font-size:13px;font-weight:700;color:var(--text-muted);margin-left:4px;white-space:nowrap}

/* TABS */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1.5px solid var(--border);display:flex;z-index:100}
.tab-btn{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:22px}

/* SECTIONS */
.section{display:none;padding:0 1.2rem}
.section.active{display:block}
.sec-label{font-family:'Fredoka One',cursive;font-size:17px;color:var(--accent);margin:1.2rem 0 .6rem}

/* CHORE CARDS */
.chore-list{display:flex;flex-direction:column;gap:10px}
.chore-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s,border-color .2s,background .2s,opacity .2s;user-select:none}
.chore-card:active{transform:scale(.97)}
.chore-card.done{background:var(--green-light);border-color:#86efac;opacity:.8}
.chore-card.pending{background:#fff7ed;border-color:#fed7aa;opacity:.9}
.chore-emoji{font-size:34px;width:46px;text-align:center;flex-shrink:0}
.chore-info{flex:1;min-width:0}
.chore-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.25}
.chore-card.done .chore-name{text-decoration:line-through;color:var(--text-muted)}
.chore-coins{font-size:13px;color:var(--accent);font-weight:700;margin-top:2px}
.chore-status{font-size:12px;font-weight:700;color:var(--orange);margin-top:2px}
.chore-check{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all .15s}
.chore-card.done .chore-check{background:var(--green);border-color:var(--green)}
.chore-card.pending .chore-check{background:var(--orange);border-color:var(--orange)}

.progress-wrap{margin:.8rem 0 0;background:var(--border);border-radius:50px;height:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:50px;transition:width .4s ease}
.progress-lbl{font-size:12px;font-weight:700;color:var(--text-muted);margin-top:4px;text-align:right}
.empty-msg{text-align:center;font-size:15px;color:var(--text-muted);font-weight:600;padding:2rem 0}

/* SURPRISE */
.surprise-box{background:var(--gold-light);border:2px dashed var(--gold);border-radius:var(--radius);padding:1.2rem;text-align:center;margin-top:1.2rem}
.surprise-title{font-family:'Fredoka One',cursive;font-size:18px;color:#92400e;margin-bottom:6px}
.surprise-text{font-size:15px;font-weight:700;color:#78350f;min-height:42px;margin-bottom:10px}
.surprise-coins{font-size:13px;color:#b45309;font-weight:700;margin-bottom:10px}
.btn-gold{background:var(--gold);color:white;border:none;border-radius:50px;padding:11px 28px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;transition:transform .1s;display:inline-block}
.btn-gold:active{transform:scale(.96)}
.btn-gold:disabled{background:#d1d5db;cursor:default}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:transform .1s,border-color .15s;user-select:none}
.shop-card:active{transform:scale(.96)}
.shop-card.affordable{border-color:var(--accent)}
.shop-card.cant-afford{opacity:.5;cursor:default}
.shop-emoji{font-size:32px;margin-bottom:5px}
.shop-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.2}
.shop-cost{font-size:14px;color:var(--accent);font-weight:800}
.shop-card.cant-afford .shop-cost{color:var(--text-muted)}

/* HISTORY */
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.hi-left{font-weight:700;color:var(--text)}
.hi-right{font-weight:800;color:var(--accent);white-space:nowrap;margin-left:8px}
.hi-date{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:1px}
.hi-neg{color:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,27,74,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:1.5rem 1.4rem 2rem;width:100%;max-width:430px;max-height:88dvh;overflow-y:auto}
.modal-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--accent);margin-bottom:1rem;text-align:center}

/* PIN */
.pin-row{display:flex;gap:8px;margin-bottom:1rem}
.pin-input{flex:1;font-size:28px;font-family:'Fredoka One',cursive;text-align:center;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);background:var(--surface);letter-spacing:8px;outline:none}
.pin-input:focus{border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--red);font-weight:700;text-align:center;margin-top:6px}

/* BUTTONS */
.btn-purple{background:var(--accent);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;width:100%;margin-top:8px;transition:opacity .15s}
.btn-purple:hover{opacity:.88}
.btn-danger{background:var(--red);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;width:100%;margin-top:10px}
.btn-success{background:var(--green);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;width:100%;margin-top:8px}
.btn-close{background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);border-radius:50px;padding:10px 28px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;width:100%;margin-top:8px}
.btn-sm{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-sm-danger{background:var(--red);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer}
.btn-sm-success{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer}

/* PARENT PANEL INTERNALS */
.parent-section{display:none}
.parent-section.unlocked{display:block}
.kid-tabs{display:flex;gap:8px;margin-bottom:14px}
.kid-tab{flex:1;padding:8px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface2);font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;text-align:center;color:var(--text-muted);transition:all .15s}
.kid-tab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.parent-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.parent-nav-btn{flex:1;min-width:80px;padding:9px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer;text-align:center;color:var(--text-muted);transition:all .15s;position:relative}
.parent-nav-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.parent-nav-badge{position:absolute;top:-6px;right:-6px;background:var(--orange);color:white;font-size:10px;font-weight:800;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid white}
.parent-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:10px;font-size:14px;font-weight:700;color:var(--text);display:flex;justify-content:space-between}
.parent-stat span{color:var(--accent);font-size:16px}
.add-coins-row{display:flex;gap:8px;margin-bottom:10px}
.add-coins-row input{flex:1;font-size:16px;font-family:'Nunito',sans-serif;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);background:var(--surface);outline:none}
.add-coins-row input:focus{border-color:var(--accent)}

/* APPROVAL CARDS */
.approval-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.approval-card.chore-type{border-left:4px solid var(--orange)}
.approval-card.shop-type{border-left:4px solid var(--accent)}
.approval-meta{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.approval-label{font-size:15px;font-weight:800;color:var(--text);margin-bottom:10px}
.approval-actions{display:flex;gap:8px}

/* EDITOR */
.editor-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.editor-item-info{flex:1;min-width:0}
.editor-item-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.editor-item-sub{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:1px}
.editor-actions{display:flex;gap:6px;flex-shrink:0}
.add-form{background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.add-form input,.add-form select{width:100%;font-size:14px;font-family:'Nunito',sans-serif;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);background:var(--surface);outline:none;margin-bottom:8px}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.add-form-row{display:flex;gap:8px}
.add-form-row input{margin-bottom:0}
.form-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:white;font-family:'Fredoka One',cursive;font-size:16px;padding:11px 24px;border-radius:50px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.18)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--red)}
.toast.info{background:var(--accent)}
.toast.warn{background:var(--orange)}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:9999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* DRAGON SVG */
.dragon-svg{width:100%;height:100%}
</style>
</head>
<body>

<!-- PROFILE PICKER -->
<div id="profile-screen">
  <div class="picker-title">⭐ Chore Quest ⭐</div>
  <div class="picker-sub">Who's doing chores today?</div>
  <div class="picker-cards" id="picker-cards"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header" id="main-header">
    <button class="header-back" onclick="goBack()">👈</button>
    <div class="badge-wrap" style="position:absolute;top:14px;right:14px">
      <button class="settings-btn" style="position:static" onclick="openParent()">⚙️</button>
      <div class="notif-badge" id="header-badge" style="display:none">0</div>
    </div>
    <div class="header-avatar-wrap" id="header-avatar-wrap"></div>
    <div class="header-name" id="header-name"></div>
    <div class="coin-pill">🪙 <span id="coin-count">0</span> coins</div>
  </div>

  <div class="streak-row" id="streak-row"></div>

  <div id="tab-chores"  class="section active"></div>
  <div id="tab-shop"    class="section"></div>
  <div id="tab-history" class="section"></div>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('chores',this)"><span class="tab-icon">📋</span>Chores</button>
    <button class="tab-btn" onclick="switchTab('shop',this)"><span class="tab-icon">🛒</span>Shop</button>
    <button class="tab-btn" onclick="switchTab('history',this)"><span class="tab-icon">📜</span>History</button>
  </nav>
</div>

<!-- PARENT MODAL -->
<div class="modal-overlay" id="parent-overlay">
  <div class="modal">
    <div class="modal-title">🔒 Parent Portal</div>
    <div id="pin-area">
      <div class="pin-row">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin-field" placeholder="••••" autocomplete="off">
      </div>
      <button class="btn-purple" onclick="checkPin()">Unlock</button>
      <div class="pin-error" id="pin-error"></div>
    </div>
    <div class="parent-section" id="parent-unlocked">
      <div class="kid-tabs" id="parent-kid-tabs"></div>
      <div class="parent-nav" id="parent-nav"></div>
      <div id="parent-content"></div>
      <button class="btn-close" onclick="closeParent()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== DRAGON SVG ====================
function dragonSVG(size){
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" class="dragon-svg">
    <defs>
      <radialGradient id="dg1" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#a855f7"/>
        <stop offset="100%" stop-color="#4c1d95"/>
      </radialGradient>
      <radialGradient id="dg2" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c084fc"/>
        <stop offset="100%" stop-color="#7c3aed"/>

// ==================== STORAGE ====================
const GLOBAL_KEY = 'chorequest_global_v1';
const kidKey = id => `chorequest_${id}_v1`;

function loadGlobal(){
  try{ return JSON.parse(localStorage.getItem(GLOBAL_KEY)||'null') || { shop: null, surprises: null }; }
  catch(e){ return { shop: null, surprises: null }; }
}
function saveGlobal(g){ localStorage.setItem(GLOBAL_KEY, JSON.stringify(g)); }

function loadKidConfig(kid){
  try{
    const raw = localStorage.getItem('chorequest_cfg_'+kid.id);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveKidConfig(kidId, cfg){ localStorage.setItem('chorequest_cfg_'+kidId, JSON.stringify(cfg)); }

function loadKidState(kidId){
  try{
    const raw = localStorage.getItem(kidKey(kidId));
    if(raw){
      const p = JSON.parse(raw);
      const done = {};
      if(p.done) for(const [d,a] of Object.entries(p.done)) done[d]=new Set(a);
      return {...p, done};
    }
  }catch(e){}
  return { coins:0, coinsEarned:0, streak:0, lastActiveDate:null, done:{}, surprise:{}, history:[], pendingChores:[], pendingShop:[] };
}
function saveKidState(kidId, s){
  const out = {...s, done: Object.fromEntries(Object.entries(s.done).map(([d,set])=>[d,[...set]]))};
  localStorage.setItem(kidKey(kidId), JSON.stringify(out));
}

// ==================== RUNTIME STATE ====================
let globalCfg = loadGlobal();

// Effective shop/surprises: from localStorage override or CONFIG defaults
function getShop(){ return globalCfg.shop || JSON.parse(JSON.stringify(CONFIG.shop)); }
function getSurprises(){ return globalCfg.surprises || JSON.parse(JSON.stringify(CONFIG.surprises)); }

// Effective kids array (merge saved chore configs)
function getKids(){
  return CONFIG.kids.map(kid => {
    const saved = loadKidConfig(kid);
    return saved ? {...kid, ...saved} : {...kid};
  });
}

const states = {};
let kids = getKids();
for(const k of kids) states[k.id] = loadKidState(k.id);

let activeKid = null;
let parentKidView = null;
let parentTab = 'approvals';

function state(){ return states[activeKid.id]; }
function kid(){ return activeKid; }
function activeKidFull(){ return kids.find(k=>k.id===activeKid.id); }

// ==================== DATES ====================
function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayName(){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()]; }
function isWeekend(){ const d=new Date().getDay(); return d===0||d===6; }
function formatDate(s){ if(!s)return''; const[y,m,da]=s.split('-'); return`${m}/${da}/${y}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ==================== PENDING COUNT ====================
function totalPending(){
  let n=0;
  for(const k of kids){
    const s=states[k.id];
    n+=(s.pendingChores||[]).length+(s.pendingShop||[]).length;
  }
  return n;
}
function updateBadge(){
  const n=totalPending();
  const b=document.getElementById('header-badge');
  if(b){ b.style.display=n?'flex':'none'; b.textContent=n; }
}

// ==================== STREAK ====================
function checkStreak(){
  const s=state(); const t=today();
  if(s.lastActiveDate===t)return;
  const d=new Date(); d.setDate(d.getDate()-1);
  const yest=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(s.lastActiveDate===yest) s.streak=(s.streak||0)+1;
  else if(s.lastActiveDate!==t) s.streak=1;
  s.lastActiveDate=t;
  saveKidState(activeKid.id,s);
}

function renderStreak(){
  const row=document.getElementById('streak-row');
  const streak=Math.min(state().streak||0,7);
  let html='';
  for(let i=0;i<7;i++) html+=`<div class="streak-dot ${i<streak?'lit':''}">${i<streak?'⭐':i+1}</div>`;
  html+=`<span class="streak-lbl">${state().streak||0}-day streak!</span>`;
  row.innerHTML=html;
}

// ==================== CHORES ====================
function choreVisible(chore){
  const d=chore.days;
  if(!d||d==='daily')return true;
  if(d==='weekends')return isWeekend();
  if(d==='weekdays')return!isWeekend();
  if(Array.isArray(d))return d.includes(dayName());
  return true;
}

function todayDone(){ return state().done[today()]||new Set(); }

function renderChores(){
  const container=document.getElementById('tab-chores');
  const kd=activeKidFull();
  const visible=(kd.chores||[]).filter(choreVisible);
  const done=todayDone();
  const pending=state().pendingChores||[];
  const pendingIds=new Set(pending.map(p=>p.choreId));
  const doneCount=[...done].filter(id=>(kd.chores||[]).find(c=>c.id===id)).length;
  const total=visible.length;
  const pct=total?Math.round((doneCount/total)*100):0;

  let html=`<div class="sec-label">📋 Today's chores</div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-lbl">${doneCount} of ${total} done</div>
    <div class="chore-list" style="margin-top:.8rem">`;

  if(!visible.length){
    html+=`<div class="empty-msg">No chores today — enjoy your day! 🎉</div>`;
  } else {
    for(const c of visible){
      const isDone=done.has(c.id);
      const isPending=pendingIds.has(c.id);
      let cls=''; let checkIcon='⭕'; let statusLine='';
      if(isDone){ cls='done'; checkIcon='✅'; }
      else if(isPending){ cls='pending'; checkIcon='⏳'; statusLine=`<div class="chore-status">⏳ Waiting for parent approval</div>`; }
      html+=`<div class="chore-card ${cls}" onclick="toggleChore('${c.id}')">
        <div class="chore-emoji">${c.emoji}</div>
        <div class="chore-info">
          <div class="chore-name">${c.name}</div>
          <div class="chore-coins">🪙 +${c.coins} coins</div>
          ${statusLine}
        </div>
        <div class="chore-check">${checkIcon}</div>
      </div>`;
    }
  }
  html+=`</div>`;

  // Surprise
  const t=today();
  if(!state().surprise[t]){
    const surps=getSurprises();
    state().surprise[t]={idx:Math.floor(Math.random()*surps.length),claimed:false};
    saveKidState(activeKid.id,state());
  }
  const sd=state().surprise[t];
  const surps=getSurprises();
  const surprise=surps[sd.idx]||surps[0];
  const claimed=sd.claimed;

  html+=`<div class="surprise-box">
    <div class="surprise-title">🎲 Bonus Challenge!</div>
    <div class="surprise-text">${claimed?'Amazing! Come back tomorrow for a new challenge! 🌟':surprise.text}</div>
    ${!claimed?`<div class="surprise-coins">🪙 Worth +${surprise.coins} coins!</div>`:''}
    <button class="btn-gold" ${claimed?'disabled':''} onclick="claimSurprise()">
      ${claimed?'✅ Claimed!':"🎉 I did it! Collect coins"}
    </button>
  </div>`;

  container.innerHTML=html;
}

function toggleChore(id){
  const t=today();
  const s=state();
  if(!s.done[t]) s.done[t]=new Set();
  const kd=activeKidFull();
  const chore=(kd.chores||[]).find(c=>c.id===id);
  if(!chore)return;

  const pending=s.pendingChores||[];
  const pendingIdx=pending.findIndex(p=>p.choreId===id);

  if(s.done[t].has(id)){
    // Undo completed chore
    s.done[t].delete(id);
    s.coins=Math.max(0,s.coins-chore.coins);
    addHistory(`Unchecked: ${chore.name}`,-chore.coins);
    showToast('Chore unchecked','bad');
    saveKidState(activeKid.id,s);
    renderAll();
    return;
  }

  if(pendingIdx>=0){
    // Cancel pending
    pending.splice(pendingIdx,1);
    s.pendingChores=pending;
    showToast('Approval request cancelled','bad');
    saveKidState(activeKid.id,s);
    updateBadge();
    renderAll();
    return;
  }

  // Submit for approval
  s.pendingChores=[...(s.pendingChores||[]),{id:uid(),choreId:id,choreName:chore.name,coins:chore.coins,date:t}];
  showToast('Sent to parent for approval! ⏳','warn');
  saveKidState(activeKid.id,s);
  updateBadge();
  renderAll();
}

function claimSurprise(){
  const t=today(); const s=state();
  const sd=s.surprise[t];
  if(!sd||sd.claimed)return;
  const surps=getSurprises();
  const surprise=surps[sd.idx]||surps[0];
  s.coins+=surprise.coins;
  s.coinsEarned=(s.coinsEarned||0)+surprise.coins;
  sd.claimed=true;
  addHistory('🎲 Bonus challenge',surprise.coins);
  showToast(`Bonus! +${surprise.coins} coins! 🌟`);
  confetti();
  saveKidState(activeKid.id,s);
  renderAll();
}

function renderShop(){
  const container=document.getElementById('tab-shop');
  const shop=getShop();
  let html=`<div class="sec-label">🛒 Coin shop</div>
    <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px">
      Pick a reward — a parent will need to approve it!
    </p>
    <div class="shop-grid">`;
  for(const item of shop){
    const can=state().coins>=item.cost;
    html+=`<div class="shop-card ${can?'affordable':'cant-afford'}" onclick="buyItem('${item.id}')">
      <div class="shop-emoji">${item.emoji}</div>
      <div class="shop-name">${item.name}</div>
      <div class="shop-cost">🪙 ${item.cost}</div>
    </div>`;
  }
  html+=`</div>`;
  container.innerHTML=html;

function buyItem(id){
  const shop=getShop();
  const item=shop.find(i=>i.id===id);
  if(!item)return;
  if(state().coins<item.cost){ showToast('Not enough coins yet! 😅','bad'); return; }
  const s=state();
  s.pendingShop=[...(s.pendingShop||[]),{id:uid(),itemId:id,itemName:item.name,itemEmoji:item.emoji,cost:item.cost,date:today()}];
  showToast(`${item.emoji} Sent to parent for approval! ⏳`,'warn');
  saveKidState(activeKid.id,s);
  updateBadge();
  renderAll();
}

// ==================== HISTORY ====================
function addHistory(label,delta){
  const s=state();
  s.history=s.history||[];
  s.history.unshift({date:today(),label,delta});
  if(s.history.length>100) s.history=s.history.slice(0,100);
}

function renderHistory(){
  const container=document.getElementById('tab-history');
  const h=state().history||[];
  let html=`<div class="sec-label">📜 Coin history</div>`;
  if(!h.length){ html+=`<div class="empty-msg" style="padding-top:2rem">No history yet — start doing chores! 💪</div>`; }
  else{
    html+=`<div class="history-list">`;
    for(const item of h){
      const plus=item.delta>=0;
      html+=`<div class="history-item">
        <div class="hi-left">${item.label}<div class="hi-date">${formatDate(item.date)}</div></div>
        <div class="hi-right ${!plus?'hi-neg':''}">${plus?'+':''}${item.delta} 🪙</div>
      </div>`;
    }
    html+=`</div>`;
  }
  container.innerHTML=html;
}

// ---- APPROVALS ----
function renderApprovalsTab(){
  const s=states[parentKidView];
  const kd=kids.find(k=>k.id===parentKidView);
  const pc=s.pendingChores||[];
  const ps=s.pendingShop||[];
  if(!pc.length&&!ps.length){
    return`<div class="empty-msg" style="padding:1.5rem 0">🎉 No pending approvals!</div>`;
  }
  let html='';
  for(const p of pc){
    html+=`<div class="approval-card chore-type">
      <div class="approval-meta">📋 Chore · ${formatDate(p.date)}</div>
      <div class="approval-label">${p.choreName} · 🪙 +${p.coins}</div>
      <div class="approval-actions">
        <button class="btn-sm-success" onclick="approveChore('${parentKidView}','${p.id}')">✅ Approve</button>
        <button class="btn-sm-danger" onclick="denyChore('${parentKidView}','${p.id}')">✗ Deny</button>
      </div>
    </div>`;
  }
  for(const p of ps){
    html+=`<div class="approval-card shop-type">
      <div class="approval-meta">🛒 Shop · ${formatDate(p.date)}</div>
      <div class="approval-label">${p.itemEmoji} ${p.itemName} · 🪙 -${p.cost}</div>
      <div class="approval-actions">
        <button class="btn-sm-success" onclick="approveShop('${parentKidView}','${p.id}')">✅ Approve</button>
        <button class="btn-sm-danger" onclick="denyShop('${parentKidView}','${p.id}')">✗ Deny</button>
      </div>
    </div>`;
  }
  return html;
}

function approveChore(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingChores||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  const p=s.pendingChores[idx];
  s.pendingChores.splice(idx,1);
  if(!s.done[p.date]) s.done[p.date]=new Set();
  s.done[p.date].add(p.choreId);
  s.coins+=p.coins;
  s.coinsEarned=(s.coinsEarned||0)+p.coins;
  s.history=s.history||[];
  s.history.unshift({date:p.date,label:`✅ ${p.choreName}`,delta:p.coins});
  saveKidState(kidId,s);
  updateBadge();
  showToast('Chore approved! Coins awarded 🎉');
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

function denyChore(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingChores||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  s.pendingChores.splice(idx,1);
  saveKidState(kidId,s);
  updateBadge();
  showToast('Chore denied','bad');
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

function approveShop(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingShop||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  const p=s.pendingShop[idx];
  if(s.coins<p.cost){ showToast('Not enough coins!','bad'); return; }
  s.pendingShop.splice(idx,1);
  s.coins=Math.max(0,s.coins-p.cost);
  s.history=s.history||[];
  s.history.unshift({date:p.date,label:`🛒 ${p.itemName}`,delta:-p.cost});
  saveKidState(kidId,s);
  updateBadge();
  showToast(`${p.itemEmoji} Purchase approved!`);
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

function denyShop(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingShop||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  s.pendingShop.splice(idx,1);
  saveKidState(kidId,s);
  updateBadge();
  showToast('Purchase denied','bad');
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

// ---- STATS ----
function renderStatsTab(){
  const s=states[parentKidView];
  const kd=kids.find(k=>k.id===parentKidView);
  const todayDoneCount=[...(s.done[today()]||new Set())].filter(id=>(kd.chores||[]).find(c=>c.id===id)).length;
  return `
    <div class="parent-stat">Total coins earned <span>${s.coinsEarned||0}</span></div>
    <div class="parent-stat">Current balance <span>${s.coins}</span></div>
    <div class="parent-stat">Day streak <span>${s.streak||0}</span></div>
    <div class="parent-stat">Chores done today <span>${todayDoneCount}</span></div>
    <p style="font-size:13px;font-weight:700;color:var(--text-muted);margin:12px 0 6px">Add or remove coins manually:</p>
    <div class="add-coins-row">
      <input type="number" id="adjust-amount" placeholder="e.g. 10 or -5" min="-999" max="999">
      <button class="btn-sm" onclick="adjustCoins()">Apply</button>
    </div>
    <button class="btn-danger" onclick="resetKid()" style="margin-top:8px">⚠️ Reset ${kd.name}'s data</button>
  `;
}

function adjustCoins(){
  const amt=parseInt(document.getElementById('adjust-amount').value,10);
  if(isNaN(amt)){ showToast('Enter a number first','bad'); return; }
  const s=states[parentKidView];
  s.coins=Math.max(0,s.coins+amt);
  if(amt>0) s.coinsEarned=(s.coinsEarned||0)+amt;
  s.history=s.history||[];
  s.history.unshift({date:today(),label:'Parent adjustment',delta:amt});
  saveKidState(parentKidView,s);
  if(activeKid&&activeKid.id===parentKidView) renderAll();
  renderParentPortal();
  showToast(`Coins adjusted by ${amt>=0?'+':''}${amt}`,'info');
}

function resetKid(){
  const kd=kids.find(k=>k.id===parentKidView);
  if(!confirm(`Reset ALL of ${kd.name}'s coins, history, and streak?`))return;
  localStorage.removeItem(kidKey(parentKidView));
  states[parentKidView]=loadKidState(parentKidView);
  if(activeKid&&activeKid.id===parentKidView) renderAll();
  renderParentPortal();
  showToast(`${kd.name}'s data reset`,'bad');
}

// ---- CHORES EDITOR ----
function renderChoresEditorTab(){
  const kd=kids.find(k=>k.id===parentKidView);
  const chores=kd.chores||[];
  let html=`<div class="add-form">
    <div class="form-label">Add a new chore</div>
    <input id="new-chore-emoji" placeholder="Emoji (e.g. 🧹)" maxlength="4" style="width:80px;display:inline-block;margin-right:8px">
    <input id="new-chore-name" placeholder="Chore name" style="width:calc(100% - 96px);display:inline-block;margin-bottom:8px">
    <div class="add-form-row">
      <input id="new-chore-coins" type="number" placeholder="Coins" min="1" max="999">
      <select id="new-chore-days">
        <option value="daily">Every day</option>
        <option value="weekdays">Weekdays only</option>
        <option value="weekends">Weekends only</option>
      </select>
      <button class="btn-sm" onclick="addChore()">Add</button>
    </div>
  </div>`;

  if(!chores.length){ html+=`<div class="empty-msg">No chores yet — add one above!</div>`; }
  else{
    for(const c of chores){
      const daysLabel={daily:'Daily',weekdays:'Weekdays',weekends:'Weekends'}[c.days||'daily']||c.days;
      html+=`<div class="editor-item">
        <div style="font-size:24px;margin-right:4px">${c.emoji}</div>
        <div class="editor-item-info">
          <div class="editor-item-name">${c.name}</div>
          <div class="editor-item-sub">🪙 ${c.coins} · ${daysLabel}</div>
        </div>
        <div class="editor-actions">
          <button class="btn-sm" onclick="editChorePrompt('${parentKidView}','${c.id}')">Edit</button>
          <button class="btn-sm-danger" onclick="deleteChore('${parentKidView}','${c.id}')">✗</button>
        </div>
      </div>`;
    }
  }
  return html;
}

function addChore(){
  const emoji=document.getElementById('new-chore-emoji').value.trim()||'⭐';
  const name=document.getElementById('new-chore-name').value.trim();
  const coins=parseInt(document.getElementById('new-chore-coins').value,10);
  const days=document.getElementById('new-chore-days').value;
  if(!name){ showToast('Enter a chore name','bad'); return; }
  if(!coins||coins<1){ showToast('Enter coin amount','bad'); return; }
  const kd=kids.find(k=>k.id===parentKidView);
  const newChore={id:uid(),emoji,name,coins,days};
  const updated={...kd,chores:[...(kd.chores||[]),newChore]};
  saveKidConfig(parentKidView,{chores:updated.chores});
  kids=getKids();
  showToast('Chore added!');
  renderParentPortal();
}

function editChorePrompt(kidId,choreId){
  const kd=kids.find(k=>k.id===kidId);
  const chore=(kd.chores||[]).find(c=>c.id===choreId);
  if(!chore)return;
  const newCoins=prompt(`Edit coins for "${chore.name}":`, chore.coins);
  if(newCoins===null)return;
  const parsed=parseInt(newCoins,10);
  if(isNaN(parsed)||parsed<1){ showToast('Invalid amount','bad'); return; }
  const newName=prompt('Edit chore name:', chore.name);
  if(newName===null)return;
  const updated=kd.chores.map(c=>c.id===choreId?{...c,name:newName.trim()||c.name,coins:parsed}:c);
  saveKidConfig(kidId,{chores:updated});
  kids=getKids();
  showToast('Chore updated!');
  renderParentPortal();
}

function deleteChore(kidId,choreId){
  if(!confirm('Delete this chore?'))return;
  const kd=kids.find(k=>k.id===kidId);
  const updated=(kd.chores||[]).filter(c=>c.id!==choreId);
  saveKidConfig(kidId,{chores:updated});
  kids=getKids();
  showToast('Chore deleted','bad');
  renderParentPortal();
}

// ---- SHOP EDITOR ----
function renderShopEditorTab(){
  const shop=getShop();
  let html=`<div class="add-form">
    <div class="form-label">Add a new reward</div>
    <input id="new-shop-emoji" placeholder="Emoji" maxlength="4" style="width:80px;display:inline-block;margin-right:8px">
    <input id="new-shop-name" placeholder="Reward name" style="width:calc(100% - 96px);display:inline-block;margin-bottom:8px">
    <div class="add-form-row">
      <input id="new-shop-cost" type="number" placeholder="Coin cost" min="1" max="9999">
      <button class="btn-sm" onclick="addShopItem()">Add</button>
    </div>
  </div>`;

  for(const item of shop){
    html+=`<div class="editor-item">
      <div style="font-size:24px;margin-right:4px">${item.emoji}</div>
      <div class="editor-item-info">
        <div class="editor-item-name">${item.name}</div>
        <div class="editor-item-sub">🪙 ${item.cost} coins</div>
      </div>
      <div class="editor-actions">
        <button class="btn-sm" onclick="editShopItem('${item.id}')">Edit</button>
        <button class="btn-sm-danger" onclick="deleteShopItem('${item.id}')">✗</button>
      </div>
    </div>`;
  }
  return html;
}

function addShopItem(){
  const emoji=document.getElementById('new-shop-emoji').value.trim()||'🎁';
  const name=document.getElementById('new-shop-name').value.trim();
  const cost=parseInt(document.getElementById('new-shop-cost').value,10);
  if(!name){ showToast('Enter a reward name','bad'); return; }
  if(!cost||cost<1){ showToast('Enter coin cost','bad'); return; }
  const shop=getShop();
  shop.push({id:uid(),emoji,name,cost});
  globalCfg.shop=shop;
  saveGlobal(globalCfg);
  showToast('Reward added!');
  renderParentPortal();
}

function editShopItem(itemId){
  const shop=getShop();
  const item=shop.find(i=>i.id===itemId);
  if(!item)return;
  const newCost=prompt(`Edit coin cost for "${item.name}":`, item.cost);
  if(newCost===null)return;
  const parsed=parseInt(newCost,10);
  if(isNaN(parsed)||parsed<1){ showToast('Invalid amount','bad'); return; }
  const newName=prompt('Edit reward name:', item.name);
  if(newName===null)return;
  const updated=shop.map(i=>i.id===itemId?{...i,name:newName.trim()||i.name,cost:parsed}:i);
  globalCfg.shop=updated;
  saveGlobal(globalCfg);
  showToast('Reward updated!');
  renderParentPortal();
}

function deleteShopItem(itemId){
  if(!confirm('Delete this reward?'))return;
  const shop=getShop().filter(i=>i.id!==itemId);
  globalCfg.shop=shop;
  saveGlobal(globalCfg);
  showToast('Reward deleted','bad');
  renderParentPortal();
}

// ==================== UI HELPERS ====================
function updateCoinDisplay(){ document.getElementById('coin-count').textContent=state().coins; }

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.className='toast',2500);
}

function confetti(){
  const colors=[activeKid.color,'#f59e0b','#22c55e','#ec4899','#3b82f6'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.4}s;animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

function renderAll(){
  updateCoinDisplay();
  renderStreak();
  renderChores();
  renderShop();
  renderHistory();
  updateBadge();
}

// ==================== EVENTS ====================
document.getElementById('parent-overlay').addEventListener('click',function(e){ if(e.target===this)closeParent(); });
document.getElementById('pin-field').addEventListener('keydown',function(e){ if(e.key==='Enter')checkPin(); });

// ==================== INIT ====================
renderPicker();
</script>

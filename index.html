<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:      #7c3aed;
    --accent-mid:  #8b5cf6;
    --accent-light:#ede9fe;
    --gold:        #f59e0b;
    --gold-light:  #fef3c7;
    --green:       #22c55e;
    --green-light: #f0fdf4;
    --red:         #ef4444;
    --surface:     #ffffff;
    --surface2:    #f8f7ff;
    --border:      #e9d5ff;
    --text:        #1e1b4b;
    --text-muted:  #7c7a9a;
    --radius:      18px;
    --radius-sm:   12px;
  }

  html, body {
    height: 100%;
    background: var(--surface2);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
  }

  /* ---- PROFILE PICKER ---- */
  #profile-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    gap: 1.5rem;
  }

  .picker-title {
    font-family: 'Fredoka One', cursive;
    font-size: 30px;
    color: var(--text);
    text-align: center;
  }

  .picker-sub {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    margin-top: -1rem;
  }

  .picker-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
  }

  .picker-card {
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: 24px;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .picker-card:active { transform: scale(0.97); }

  .picker-avatar {
    font-size: 52px;
    width: 72px;
    text-align: center;
    flex-shrink: 0;
  }

  .picker-info { flex: 1; }

  .picker-name {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    line-height: 1;
  }

  .picker-coins {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .picker-arrow {
    font-size: 28px;
    color: var(--text-muted);
  }

  /* ---- MAIN APP (hidden until profile chosen) ---- */
  #app { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 90px; }
  #app.visible { display: flex; }

  /* ---- HEADER ---- */
  .header {
    padding: 1.4rem 1.2rem 2rem;
    border-radius: 0 0 28px 28px;
    color: white;
    position: relative;
    text-align: center;
    background: linear-gradient(140deg, var(--accent) 0%, var(--accent-mid) 100%);
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    transition: background 0.4s;
  }

  .header-back {
    position: absolute;
    top: 14px; left: 14px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }

  .settings-btn {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }

  .header-avatar { font-size: 36px; line-height: 1; }

  .header-name {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .coin-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.22);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 20px;
    font-weight: 800;
    margin-top: 10px;
    font-family: 'Fredoka One', cursive;
  }

  /* ---- STREAK ---- */
  .streak-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin: 1rem 1.2rem 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    flex-wrap: wrap;
  }

  .streak-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    transition: background 0.3s, border-color 0.3s;
  }

  .streak-dot.lit {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .streak-lbl {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    margin-left: 4px;
    white-space: nowrap;
  }

  /* ---- TABS ---- */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    display: flex;
    z-index: 100;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 0 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    transition: color 0.15s;
  }

  .tab-btn.active { color: var(--accent); }
  .tab-icon { font-size: 22px; }

  /* ---- SECTIONS ---- */
  .section { display: none; padding: 0 1.2rem; }
  .section.active { display: block; }

  .sec-label {
    font-family: 'Fredoka One', cursive;
    font-size: 17px;
    color: var(--accent);
    margin: 1.2rem 0 0.6rem;
  }

  /* ---- CHORE CARDS ---- */
  .chore-list { display: flex; flex-direction: column; gap: 10px; }

  .chore-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 13px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.2s, background 0.2s, opacity 0.2s;
    user-select: none;
  }

  .chore-card:active { transform: scale(0.97); }

  .chore-card.done {
    background: var(--green-light);
    border-color: #86efac;
    opacity: 0.8;
  }

  .chore-emoji { font-size: 34px; width: 46px; text-align: center; flex-shrink: 0; }
  .chore-info { flex: 1; min-width: 0; }

  .chore-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
  }

  .chore-card.done .chore-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .chore-coins {
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-top: 2px;
  }

  .chore-check {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .chore-card.done .chore-check {
    background: var(--green);
    border-color: var(--green);
  }

  .progress-wrap {
    margin: 0.8rem 0 0;
    background: var(--border);
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .progress-lbl {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  .empty-msg {
    text-align: center;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 2rem 0;
  }

  /* ---- SURPRISE ---- */
  .surprise-box {
    background: var(--gold-light);
    border: 2px dashed var(--gold);
    border-radius: var(--radius);
    padding: 1.2rem;
    text-align: center;
    margin-top: 1.2rem;
  }

  .surprise-title {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: #92400e;
    margin-bottom: 6px;
  }

  .surprise-text {
    font-size: 15px;
    font-weight: 700;
    color: #78350f;
    min-height: 42px;
    margin-bottom: 10px;
  }

  .surprise-coins {
    font-size: 13px;
    color: #b45309;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .btn-gold {
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 11px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s;
    display: inline-block;
  }

  .btn-gold:active { transform: scale(0.96); }
  .btn-gold:disabled { background: #d1d5db; cursor: default; }

  /* ---- SHOP ---- */
  .shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .shop-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    user-select: none;
  }

  .shop-card:active { transform: scale(0.96); }
  .shop-card.affordable { border-color: var(--accent); }
  .shop-card.cant-afford { opacity: 0.5; cursor: default; }

  .shop-emoji { font-size: 32px; margin-bottom: 5px; }

  .shop-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.2;
  }

  .shop-cost {
    font-size: 14px;
    color: var(--accent);
    font-weight: 800;
  }

  .shop-card.cant-afford .shop-cost { color: var(--text-muted); }

  /* ---- HISTORY ---- */
  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }

  .hi-left { font-weight: 700; color: var(--text); }
  .hi-right { font-weight: 800; color: var(--accent); white-space: nowrap; margin-left: 8px; }
  .hi-date { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 1px; }
  .hi-neg { color: var(--red); }

  /* ---- PARENT MODAL ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,27,74,0.6);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem 1.4rem 2rem;
    width: 100%;
    max-width: 430px;
    max-height: 80dvh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 1rem;
    text-align: center;
  }

  .pin-row { display: flex; gap: 8px; margin-bottom: 1rem; }

  .pin-input {
    flex: 1;
    font-size: 28px;
    font-family: 'Fredoka One', cursive;
    text-align: center;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    color: var(--text);
    background: var(--surface);
    letter-spacing: 8px;
    outline: none;
  }

  .pin-input:focus { border-color: var(--accent); }

  .btn-purple {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  .btn-danger {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
  }

  .btn-close {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  .parent-section { display: none; }
  .parent-section.unlocked { display: block; }

  .parent-stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    justify-content: space-between;
  }

  .parent-stat span { color: var(--accent); font-size: 16px; }

  .add-coins-row { display: flex; gap: 8px; margin-bottom: 10px; }

  .add-coins-row input {
    flex: 1;
    font-size: 16px;
    font-family: 'Nunito', sans-serif;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  .add-coins-row input:focus { border-color: var(--accent); }

  .btn-sm-purple {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
  }

  .pin-error {
    font-size: 13px;
    color: var(--red);
    font-weight: 700;
    text-align: center;
    margin-top: 6px;
  }

  .kid-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .kid-tab {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--surface2);
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .kid-tab.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--green);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    padding: 11px 24px;
    border-radius: 50px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.bad  { background: var(--red); }
  .toast.info { background: var(--accent); }

  /* ---- CONFETTI ---- */
  .confetti-piece {
    position: fixed;
    top: -10px;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- PROFILE PICKER -->
<div id="profile-screen">
  <div class="picker-title">⭐ Chore Quest ⭐</div>
  <div class="picker-sub">Who's doing chores today?</div>
  <div class="picker-cards" id="picker-cards"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header" id="main-header">
    <button class="header-back" onclick="goBack()" aria-label="Switch profile">👈</button>
    <button class="settings-btn" onclick="openParent()" aria-label="Parent settings">⚙️</button>
    <div class="header-avatar" id="header-avatar"></div>
    <div class="header-name" id="header-name"></div>
    <div class="coin-pill">🪙 <span id="coin-count">0</span> coins</div>
  </div>

  <div class="streak-row" id="streak-row"></div>

  <div id="tab-chores"  class="section active"></div>
  <div id="tab-shop"    class="section"></div>
  <div id="tab-history" class="section"></div>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('chores',this)">
      <span class="tab-icon">📋</span>Chores
    </button>
    <button class="tab-btn" onclick="switchTab('shop',this)">
      <span class="tab-icon">🛒</span>Shop
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)">
      <span class="tab-icon">📜</span>History
    </button>
  </nav>
</div>

<!-- PARENT MODAL -->
<div class="modal-overlay" id="parent-overlay">
  <div class="modal">
    <div class="modal-title">🔒 Parent Panel</div>

    <div id="pin-area">
      <div class="pin-row">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4"
               id="pin-field" placeholder="••••" autocomplete="off">
      </div>
      <button class="btn-purple" onclick="checkPin()">Unlock</button>
      <div class="pin-error" id="pin-error"></div>
    </div>

    <div class="parent-section" id="parent-unlocked">
      <div class="kid-tabs" id="parent-kid-tabs"></div>
      <div id="parent-stats-area"></div>
      <button class="btn-close" onclick="closeParent()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
let activeKid = null;

function storageKey(kidId) {
  return `chorequest_${kidId}_v1`;
}

function loadState(kidId) {
  try {
    const raw = localStorage.getItem(storageKey(kidId));
    if (raw) {
      const parsed = JSON.parse(raw);
      const done = {};
      if (parsed.done) {
        for (const [d, arr] of Object.entries(parsed.done)) {
          done[d] = new Set(arr);
        }
      }
      return { ...parsed, done };
    }
  } catch(e) {}
  return {
    coins: 0,
    coinsEarned: 0,
    streak: 0,
    lastActiveDate: null,
    done: {},
    surprise: {},
    history: []
  };
}

function saveState() {
  if (!activeKid) return;
  const s = states[activeKid.id];
  const out = {
    ...s,
    done: Object.fromEntries(
      Object.entries(s.done).map(([d, set]) => [d, [...set]])
    )
  };
  localStorage.setItem(storageKey(activeKid.id), JSON.stringify(out));
}

// Pre-load all kids' states
const states = {};
for (const kid of CONFIG.kids) {
  states[kid.id] = loadState(kid.id);
}

function state() { return states[activeKid.id]; }

// ===================== DATE =====================
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayName() {
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
}

function isWeekend() {
  const d = new Date().getDay();
  return d === 0 || d === 6;
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const [y, m, da] = isoStr.split('-');
  return `${m}/${da}/${y}`;
}

// ===================== PROFILE PICKER =====================
function renderPicker() {
  const container = document.getElementById('picker-cards');
  container.innerHTML = CONFIG.kids.map(kid => {
    const s = states[kid.id];
    return `
      <div class="picker-card" onclick="selectKid('${kid.id}')"
           style="border-color: ${kid.color}22;">
        <div class="picker-avatar">${kid.avatar}</div>
        <div class="picker-info">
          <div class="picker-name" style="color:${kid.color}">${kid.name}</div>
          <div class="picker-coins">🪙 ${s.coins} coins · ${s.streak || 0}-day streak</div>
        </div>
        <div class="picker-arrow">›</div>
      </div>`;
  }).join('');
}

function selectKid(kidId) {
  activeKid = CONFIG.kids.find(k => k.id === kidId);

  // Apply kid's theme color
  document.documentElement.style.setProperty('--accent', activeKid.color);
  // Derive a lighter mid-tone
  document.documentElement.style.setProperty('--accent-mid', activeKid.color + 'cc');
  document.documentElement.style.setProperty('--accent-light', activeKid.color + '18');
  document.documentElement.style.setProperty('--border', activeKid.color + '44');

  document.getElementById('header-avatar').textContent = activeKid.avatar;
  document.getElementById('header-name').textContent = activeKid.name + "'s Quest";

  checkStreak();

  document.getElementById('profile-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  // Reset to chores tab
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-chores').classList.add('active');
  document.querySelector('.tab-btn').classList.add('active');

  renderAll();
}

function goBack() {
  activeKid = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('profile-screen').style.display = '';
  renderPicker();
}

// ===================== STREAK =====================
function checkStreak() {
  const s = state();
  const t = today();
  if (s.lastActiveDate === t) return;
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  if (s.lastActiveDate === yesterday) {
    s.streak = (s.streak || 0) + 1;
  } else if (s.lastActiveDate !== t) {
    s.streak = 1;
  }
  s.lastActiveDate = t;
  saveState();
}

function renderStreak() {
  const row = document.getElementById('streak-row');
  const streak = Math.min(state().streak || 0, 7);
  let html = '';
  for (let i = 0; i < 7; i++) {
    html += `<div class="streak-dot ${i < streak ? 'lit' : ''}">${i < streak ? '⭐' : i+1}</div>`;
  }
  html += `<span class="streak-lbl">${state().streak || 0}-day streak!</span>`;
  row.innerHTML = html;
}

// ===================== CHORES =====================
function choreVisible(chore) {
  const d = chore.days;
  if (!d || d === 'daily') return true;
  if (d === 'weekends') return isWeekend();
  if (d === 'weekdays') return !isWeekend();
  if (Array.isArray(d)) return d.includes(dayName());
  return true;
}

function todayDone() {
  return state().done[today()] || new Set();
}

function renderChores() {
  const container = document.getElementById('tab-chores');
  const visible = activeKid.chores.filter(choreVisible);
  const done = todayDone();
  const doneCount = [...done].filter(id => activeKid.chores.find(c => c.id === id)).length;
  const total = visible.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;

  let html = `<div class="sec-label">📋 Today's chores</div>
    <div class="progress-wrap">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="progress-lbl">${doneCount} of ${total} done</div>
    <div class="chore-list" style="margin-top:0.8rem;">`;

  if (!visible.length) {
    html += `<div class="empty-msg">No chores today — enjoy your day! 🎉</div>`;
  } else {
    for (const c of visible) {
      const isDone = done.has(c.id);
      html += `
        <div class="chore-card ${isDone ? 'done' : ''}" onclick="toggleChore('${c.id}')">
          <div class="chore-emoji">${c.emoji}</div>
          <div class="chore-info">
            <div class="chore-name">${c.name}</div>
            <div class="chore-coins">🪙 +${c.coins} coins</div>
          </div>
          <div class="chore-check">${isDone ? '✅' : '⭕'}</div>
        </div>`;
    }
  }
  html += `</div>`;

  // Surprise
  const t = today();
  if (!state().surprise[t]) {
    state().surprise[t] = {
      idx: Math.floor(Math.random() * CONFIG.surprises.length),
      claimed: false
    };
    saveState();
  }
  const surpriseData = state().surprise[t];
  const surprise = CONFIG.surprises[surpriseData.idx];
  const claimed = surpriseData.claimed;

  html += `
    <div class="surprise-box">
      <div class="surprise-title">🎲 Bonus Challenge!</div>
      <div class="surprise-text">${claimed ? "Amazing! Come back tomorrow for a new challenge! 🌟" : surprise.text}</div>
      ${!claimed ? `<div class="surprise-coins">🪙 Worth +${surprise.coins} coins!</div>` : ''}
      <button class="btn-gold" ${claimed ? 'disabled' : ''} onclick="claimSurprise()">
        ${claimed ? '✅ Claimed!' : "🎉 I did it! Collect coins"}
      </button>
    </div>`;

  container.innerHTML = html;
}

function toggleChore(id) {
  const t = today();
  const s = state();
  if (!s.done[t]) s.done[t] = new Set();
  const chore = activeKid.chores.find(c => c.id === id);
  if (!chore) return;

  if (s.done[t].has(id)) {
    s.done[t].delete(id);
    s.coins = Math.max(0, s.coins - chore.coins);
    addHistory(`Unchecked: ${chore.name}`, -chore.coins);
    showToast('Chore unchecked', 'bad');
  } else {
    s.done[t].add(id);
    s.coins += chore.coins;
    s.coinsEarned = (s.coinsEarned || 0) + chore.coins;
    addHistory(`✅ ${chore.name}`, chore.coins);
    showToast(`+${chore.coins} coins! Great job! 🎉`);
    confetti();
  }
  saveState();
  renderAll();
}

function claimSurprise() {
  const t = today();
  const s = state();
  const sd = s.surprise[t];
  if (!sd || sd.claimed) return;
  const surprise = CONFIG.surprises[sd.idx];
  s.coins += surprise.coins;
  s.coinsEarned = (s.coinsEarned || 0) + surprise.coins;
  sd.claimed = true;
  addHistory(`🎲 Bonus challenge`, surprise.coins);
  showToast(`Bonus! +${surprise.coins} coins! 🌟`);
  confetti();
  saveState();
  renderAll();
}

// ===================== SHOP =====================
function renderShop() {
  const container = document.getElementById('tab-shop');
  let html = `<div class="sec-label">🛒 Coin shop</div>
    <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px;">
      Buy something, then find a parent to make it happen!
    </p>
    <div class="shop-grid">`;

  for (const item of CONFIG.shop) {
    const can = state().coins >= item.cost;
    html += `
      <div class="shop-card ${can ? 'affordable' : 'cant-afford'}" onclick="buyItem('${item.id}')">
        <div class="shop-emoji">${item.emoji}</div>
        <div class="shop-name">${item.name}</div>
        <div class="shop-cost">🪙 ${item.cost}</div>
      </div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function buyItem(id) {
  const item = CONFIG.shop.find(i => i.id === id);
  if (!item) return;
  if (state().coins < item.cost) { showToast('Not enough coins yet! 😅', 'bad'); return; }
  if (!confirm(`Spend ${item.cost} coins on "${item.name}"?\n\nFind a parent to confirm!`)) return;
  state().coins -= item.cost;
  addHistory(`🛒 ${item.name}`, -item.cost);
  showToast(`${item.emoji} Nice! Go find a parent!`, 'info');
  saveState();
  renderAll();
}

// ===================== HISTORY =====================
function addHistory(label, delta) {
  const s = state();
  s.history = s.history || [];
  s.history.unshift({ date: today(), label, delta });
  if (s.history.length > 100) s.history = s.history.slice(0, 100);
}

function renderHistory() {
  const container = document.getElementById('tab-history');
  const h = state().history || [];
  let html = `<div class="sec-label">📜 Coin history</div>`;
  if (!h.length) {
    html += `<div class="empty-msg" style="padding-top:2rem;">No history yet — start doing chores! 💪</div>`;
  } else {
    html += `<div class="history-list">`;
    for (const item of h) {
      const plus = item.delta >= 0;
      html += `
        <div class="history-item">
          <div class="hi-left">
            ${item.label}
            <div class="hi-date">${formatDate(item.date)}</div>
          </div>
          <div class="hi-right ${!plus ? 'hi-neg' : ''}">
            ${plus ? '+' : ''}${item.delta} 🪙
          </div>
        </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

// ===================== TABS =====================
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===================== PARENT PANEL =====================
let parentKidView = null;

function openParent() {
  parentKidView = activeKid ? activeKid.id : CONFIG.kids[0].id;
  document.getElementById('parent-overlay').classList.add('open');
  document.getElementById('pin-field').value = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('parent-unlocked').classList.remove('unlocked');
  document.getElementById('pin-area').style.display = '';
  setTimeout(() => document.getElementById('pin-field').focus(), 100);
}

function closeParent() {
  document.getElementById('parent-overlay').classList.remove('open');
}

function checkPin() {
  const val = document.getElementById('pin-field').value.trim();
  if (val === String(CONFIG.parentPin)) {
    document.getElementById('pin-area').style.display = 'none';
    document.getElementById('parent-unlocked').classList.add('unlocked');
    renderParentPanel();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN, try again.';
    document.getElementById('pin-field').value = '';
  }
}

function renderParentPanel() {
  // Kid tabs
  const tabsEl = document.getElementById('parent-kid-tabs');
  tabsEl.innerHTML = CONFIG.kids.map(k =>
    `<div class="kid-tab ${k.id === parentKidView ? 'active' : ''}"
          onclick="switchParentKid('${k.id}')">${k.avatar} ${k.name}</div>`
  ).join('');

  // Stats for selected kid
  const s = states[parentKidView];
  const kid = CONFIG.kids.find(k => k.id === parentKidView);
  const todayDoneCount = [...(s.done[today()] || new Set())]
    .filter(id => kid.chores.find(c => c.id === id)).length;

  document.getElementById('parent-stats-area').innerHTML = `
    <div class="parent-stat">Total coins earned <span>${s.coinsEarned || 0}</span></div>
    <div class="parent-stat">Current balance <span>${s.coins}</span></div>
    <div class="parent-stat">Day streak <span>${s.streak || 0}</span></div>
    <div class="parent-stat">Chores done today <span>${todayDoneCount}</span></div>

    <p style="font-size:13px;font-weight:700;color:var(--text-muted);margin:12px 0 6px;">
      Add or remove coins manually:
    </p>
    <div class="add-coins-row">
      <input type="number" id="adjust-amount" placeholder="e.g. 10 or -5" min="-999" max="999">
      <button class="btn-sm-purple" onclick="adjustCoins()">Apply</button>
    </div>
    <button class="btn-danger" onclick="resetKid()">⚠️ Reset ${kid.name}'s data</button>
  `;
}

function switchParentKid(kidId) {
  parentKidView = kidId;
  renderParentPanel();
}

function adjustCoins() {
  const amt = parseInt(document.getElementById('adjust-amount').value, 10);
  if (isNaN(amt)) { showToast('Enter a number first', 'bad'); return; }
  const s = states[parentKidView];
  s.coins = Math.max(0, s.coins + amt);
  if (amt > 0) s.coinsEarned = (s.coinsEarned || 0) + amt;
  // Save directly
  const out = { ...s, done: Object.fromEntries(Object.entries(s.done).map(([d, set]) => [d, [...set]])) };
  localStorage.setItem(storageKey(parentKidView), JSON.stringify(out));
  if (activeKid && activeKid.id === parentKidView) renderAll();
  renderParentPanel();
  document.getElementById('adjust-amount').value = '';
  showToast(`Coins adjusted by ${amt >= 0 ? '+' : ''}${amt}`, 'info');
}

function resetKid() {
  const kid = CONFIG.kids.find(k => k.id === parentKidView);
  if (!confirm(`Reset ALL of ${kid.name}'s coins, history, and streak? This cannot be undone.`)) return;
  localStorage.removeItem(storageKey(parentKidView));
  states[parentKidView] = loadState(parentKidView);
  if (activeKid && activeKid.id === parentKidView) renderAll();
  renderParentPanel();
  showToast(`${kid.name}'s data reset`, 'bad');
}

document.getElementById('parent-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeParent();
});

document.getElementById('pin-field').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPin();
});

// ===================== UI =====================
function updateCoinDisplay() {
  document.getElementById('coin-count').textContent = state().coins;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 2400);
}

function confetti() {
  const colors = [activeKid.color, '#f59e0b', '#22c55e', '#ec4899', '#3b82f6'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.2+Math.random()*1.4}s;
      animation-delay:${Math.random()*.4}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }
}

function renderAll() {
  updateCoinDisplay();
  renderStreak();
  renderChores();
  renderShop();
  renderHistory();
}

// ===================== INIT =====================
renderPicker();
</script>
</body>
</html>
